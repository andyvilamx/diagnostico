<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andy Vila | Marketing Digital para Mamás</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --accent-pink: #f2a6b1; /* Rosa suave */
            --text-dark: #4a4a4a;
            --bg-neutral: #faf8f5; /* Crema neutro */
            --white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-neutral);
            color: var(--text-dark);
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 40px 25px;
            text-align: center;
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid var(--white);
            margin-bottom: 20px;
            object-fit: cover;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        h1 { font-size: 1.4rem; margin-bottom: 5px; font-weight: 700; color: var(--text-dark); }
        .tagline { color: var(--accent-pink); font-size: 0.85rem; margin-bottom: 25px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        
        .bio { 
            font-size: 0.9rem; 
            line-height: 1.6; 
            margin-bottom: 30px; 
            color: var(--text-dark); 
            background: var(--white);
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            text-align: left;
        }

        .bio span { display: block; margin-top: 10px; font-weight: 600; color: var(--accent-pink); }

        .links-container { display: grid; gap: 12px; }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background: var(--white);
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 15px;
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 500;
            transition: all 0.3s ease;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }

        .btn:hover {
            transform: translateY(-3px);
            background: var(--accent-pink);
            color: white;
            border-color: var(--accent-pink);
        }

        .btn-ws {
            background: var(--accent-pink);
            color: white;
            font-weight: 600;
            border: none;
        }

        .social-icons {
            margin-top: 35px;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .social-icons a { color: var(--text-dark); font-size: 1.6rem; transition: 0.3s; opacity: 0.6; }
        .social-icons a:hover { color: var(--accent-pink); opacity: 1; }
        
        .footer { font-size: 0.7rem; margin-top: 50px; opacity: 0.5; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="container">
    <img src="andy.jpeg" alt="Andy Vila" class="profile-img">
    
    <h1>Andrea Avila</h1>
    <div class="tagline">Marketing digital para mamás</div>

    <div class="bio">
        Ayudo a mamás emprendedoras a vender en redes sin improvisar ni competir por precio.
        <span>🎯 +14 años en estrategia<br>⚡ Método A.N.D.I</span>
    </div>

    <div class="links-container">
        <a href="https://api.whatsapp.com/send/?phone=527731402330&text=Hola+quiero+ordenar+mi+contenido&type=phone_number&app_absent=0" target="_blank" class="btn btn-ws">
            <i class="fab fa-whatsapp"></i> Ordenar mi contenido
        </a>
        <a href="https://www.instagram.com/andyvilamx/" target="_blank" class="btn">
            <i class="fab fa-instagram"></i> Instagram @andyvilamx
        </a>
    </div>

    <div class="social-icons">
        <a href="https://www.facebook.com/AndyVilamx/" target="_blank"><i class="fab fa-facebook-f"></i></a>
        <a href="https://www.instagram.com/andyvilamx/" target="_blank"><i class="fab fa-instagram"></i></a>
    </div>

    <p class="footer">ANDY VILA MX | 2026</p>
</div>

</body>
</html>
